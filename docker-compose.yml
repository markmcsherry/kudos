services:
  db:
    image: postgres:16-alpine
    container_name: kudos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kudos}
      POSTGRES_USER: ${POSTGRES_USER:-kudos_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kudos-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kudos_app} -d ${POSTGRES_DB:-kudos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  kudos-db-data:
