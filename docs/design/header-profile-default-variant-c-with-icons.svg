  <rect x="96" y="152" width="1020" height="184" rx="20" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="124" y="192" fill="#0F172A" font-family="Arial, sans-serif" font-size="24" font-weight="700">Variant C - Profile Menu Icons</text>
  <text x="124" y="224" fill="#475569" font-family="Arial, sans-serif" font-size="14">Adds subtle icons for each profile menu item while retaining clean visual hierarchy.</text>
  <text x="124" y="248" fill="#475569" font-family="Arial, sans-serif" font-size="14">Keeps divider before logout and soft danger color for safer destructive-action recognition.</text>
  <text x="124" y="272" fill="#475569" font-family="Arial, sans-serif" font-size="14">Good fit for #44 when menu starts with placeholders and evolves to full actions.</text>

  <rect x="96" y="360" width="628" height="252" rx="20" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="124" y="400" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Icon Guidance</text>
  <text x="124" y="430" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Use one icon style set only (stroke-based or filled, not mixed).</text>
  <text x="124" y="454" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Keep icon size around 16-18px for menu density.</text>
  <text x="124" y="478" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Always keep labels (no icon-only actions in this menu).</text>
  <text x="124" y="502" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Keep logout icon + label in danger color only for that row.</text>

  <rect x="748" y="360" width="632" height="252" rx="20" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="776" y="400" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Accessibility Notes</text>
  <text x="776" y="430" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Keyboard navigation: Up/Down arrows + Enter/Space activation.</text>
  <text x="776" y="454" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Escape and outside-click close menu.</text>
  <text x="776" y="478" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Maintain visible focus ring on each item.</text>
  <text x="776" y="502" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Touch target minimum 40px height retained.</text>

  <rect x="96" y="636" width="1284" height="304" rx="20" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="124" y="676" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Figma Import Notes</text>
  <text x="124" y="704" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Import this file directly into Figma as a reviewable default direction.</text>
  <text x="124" y="728" fill="#475569" font-family="Arial, sans-serif" font-size="14">- Compare with Variant B and choose preferred style before implementation.</text>
  <text x="124" y="752" fill="#475569" font-family="Arial, sans-serif" font-size="14">- If approved, map to Header/Profile components and #44 acceptance criteria.</text>
  <text x="124" y="820" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">File: docs/design/header-profile-default-variant-c-with-icons.svg</text>
